            - img [ref=f28e32]
          - paragraph [ref=f28e35]: Betnova is a real-time sports betting platform. We combine live sports markets with crypto-powered deposits and instant settlement — built more like a trading platform than a traditional sportsbook.
        - generic [ref=f28e37]:
          - button "How do I create an account?" [ref=f28e38]:
            - text: How do I create an account?
            - img [ref=f28e39]
          - paragraph [ref=f28e41]: Click "Sign Up" and provide your email address and a password. Verification is quick and straightforward.
        - generic [ref=f28e43]:
