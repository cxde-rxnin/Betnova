            - text: What sports can I trade?
            - img [ref=f28e45]
          - paragraph [ref=f28e47]: Football, basketball, tennis, cricket, baseball, ice hockey, MMA, esports, and more — with thousands of markets updated daily.
        - generic [ref=f28e49]:
