            - text: Is my data and funds secure?
            - img [ref=f28e57]
          - paragraph [ref=f28e59]: Yes. We use 256-bit encryption, two-factor authentication, and on-chain verifiable transactions, following industry best practices throughout.
        - generic [ref=f28e61]:
