name: Betnova CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Linter
      run: npm run lint
      
    - name: Run Tests
      run: npm run test
      
    - name: Build Next.js
      run: npm run build
      env:
        # Provide dummy env vars required for build
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        MONGODB_URI: mongodb://localhost:27017/dummy
